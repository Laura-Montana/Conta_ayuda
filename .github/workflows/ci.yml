name: Conta Ayuda - CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # JOB 1: Pruebas básicas (no bloqueantes)
  basic-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
      fail-fast: false  # No cancelar otros jobs si uno falla
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest bandit safety
    
    - name: Verificar que el código importa correctamente
      run: |
        python -c "from app import store; print('✅ Importación exitosa')"
        python -c "from app.services import analysis_service; print('✅ Servicios cargados')"
    
    - name: Ejecutar pruebas que deben pasar sí o sí
      run: |
        pytest tests/unit/test_validation.py -v --tb=short
        pytest tests/unit/test_metrics.py -v --tb=short
    
    - name: Ejecutar resto de pruebas (no bloqueantes)
      run: |
        pytest tests/unit/ -v -k "not test_validation and not test_metrics" || true
        pytest tests/integration/ -v || true
      continue-on-error: true

  # JOB 2: Análisis de seguridad (solo reporta, no bloquea)
  security-scan:
    runs-on: ubuntu-latest
    needs: basic-tests
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Instalar Bandit
      run: pip install bandit
    
    - name: Escaneo Bandit (solo reporta, no falla)
      run: |
        bandit -r app/ -ll -f html -o bandit_report.html || true
        bandit -r app/ -ll -f json -o bandit_report.json || true
      continue-on-error: true
    
    - name: Subir reporte Bandit
      uses: actions/upload-artifact@v4
      with:
        name: bandit-security-report
        path: bandit_report.*

  # JOB 3: Verificación de dependencias (informativo)
  dependency-check:
    runs-on: ubuntu-latest
    needs: basic-tests
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Verificar requirements.txt existe
      run: |
        if [ -f "requirements.txt" ]; then
          echo "✅ requirements.txt encontrado"
          cat requirements.txt
        else
          echo "⚠️ No se encontró requirements.txt"
          echo "dummy" > requirements.txt
        fi
    
    - name: Escaneo básico de dependencias
      run: |
        pip install safety
        echo "⚠️ Escaneo de dependencias (modo informativo)"
        safety check --json || echo "Se encontraron vulnerabilidades, revisar manualmente"
      continue-on-error: true

  # JOB 4: Resumen final
  summary:
    runs-on: ubuntu-latest
    needs: [basic-tests, security-scan, dependency-check]
    if: always()
    
    steps:
    - name: Resumen de ejecución
      run: |
        echo "========================================="
        echo "📊 CONT AYUDA - CI PIPELINE "
        echo "========================================="
        echo "✅ basic-tests: ${{ needs.basic-tests.result }}"
        echo "✅ security-scan: ${{ needs.security-scan.result }}"
        echo "✅ dependency-check: ${{ needs.dependency-check.result }}"
        echo "========================================="
        
        if [ "${{ needs.basic-tests.result }}" = "success" ]; then
          echo "🎉 Pruebas básicas exitosas"
        else
          echo "⚠️ Algunas pruebas fallaron, revisar reportes"
        fi